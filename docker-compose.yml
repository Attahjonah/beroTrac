services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: berotrac-api

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/berotrac?schema=public
      REDIS_URL: redis://redis:6379

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_started

    command: sh -c "npm install && npm run start"

    networks:
      - berotrac-network

  postgres:
    image: postgres:17-alpine

    container_name: berotrac-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: berotrac

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - berotrac-network

  redis:
    image: redis:8-alpine

    container_name: berotrac-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - berotrac-network

networks:
  berotrac-network:

volumes:
  postgres_data:
  redis_data: